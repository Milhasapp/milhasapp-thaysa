<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MilhasApp Pro</title>
<style>
/* ═══════════════════════════════════════
   DESIGN TOKENS — SOFT DARK
═══════════════════════════════════════ */
:root{
  --bg:       #2e2e2e;
  --surface:  #383838;
  --card:     #424242;
  --card2:    #4a4a4a;
  --card3:    #535353;
  --border:   #5e5e5e;
  --border2:  #6e6e6e;
  --t1:       #f5f5f5;
  --t2:       #cccccc;
  --t3:       #aaaaaa;
  --t4:       #888888;
  --accent:   #5b9cf6;
  --accentd:  #4480d8;
  --green:    #4cce6f;
  --greend:   #2ea050;
  --red:      #f07070;
  --amber:    #f0b840;
  --purple:   #a78bfa;
  --teal:     #38c5a0;
  --r:        9px;
  --rl:       13px;
  --sh:       0 2px 10px rgba(0,0,0,.5);
  --sh2:      0 6px 28px rgba(0,0,0,.65);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--t1);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.55}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
input,select,textarea{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:9px 12px;color:var(--t1);font-size:13px;width:100%;outline:none;font-family:inherit;transition:border .18s,box-shadow .18s;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,156,246,.18)}
input::placeholder,textarea::placeholder{color:var(--t4)}
select option{background:var(--card2)}
button{cursor:pointer;font-family:inherit;border:none;outline:none;transition:all .15s}
table{border-collapse:collapse;width:100%}

/* ═══════════════════════════════════════
   LOGIN
═══════════════════════════════════════ */
#login-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,#2e2e2e,#383838)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:42px 38px;width:100%;max-width:380px;box-shadow:var(--sh2);text-align:center}
.login-logo{width:58px;height:58px;background:linear-gradient(135deg,#2a6fda,#1da0e8);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.login-title{font-size:22px;font-weight:800;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--t3);margin-bottom:28px}
.login-err{color:var(--red);font-size:12px;margin-top:8px;min-height:18px}
.login-hint{font-size:11px;color:var(--t4);margin-top:14px}

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
#app{display:none;flex-direction:column;min-height:100vh}
#app.on{display:flex}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 18px;gap:12px;position:sticky;top:0;z-index:200;flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-ico{width:34px;height:34px;background:linear-gradient(135deg,#2a6fda,#1da0e8);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name{font-weight:800;font-size:14px;letter-spacing:-.02em}
.logo-tag{font-size:10px;color:var(--t3);line-height:1}
.nav{display:flex;gap:2px;flex:1;justify-content:center}
.nb{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r);background:transparent;color:var(--t3);font-size:13px;font-weight:500;cursor:pointer;border:none;position:relative;transition:all .15s}
.nb:hover{background:var(--card);color:var(--t1)}
.nb.on{background:var(--card);color:var(--accent);font-weight:700}
.nbadge{position:absolute;top:3px;right:3px;background:#e83c3c;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;line-height:1}
.topbar-r{display:flex;gap:6px;flex-shrink:0}
main{flex:1;max-width:1300px;margin:0 auto;width:100%;padding:22px 18px}
.pg{display:none}.pg.on{display:block}

/* ═══════════════════════════════════════
   COMPONENTS
═══════════════════════════════════════ */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.csm{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:13px 16px}
.card-ttl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:13px;display:flex;align-items:center;gap:7px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--card2);border:1px solid var(--border);border-radius:var(--rl);padding:15px 16px}
.ml{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.mv{font-size:21px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.ms{font-size:11px;color:var(--t3);margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.alert{border-radius:var(--r);padding:12px 15px;margin-bottom:11px;display:flex;gap:10px;align-items:flex-start}
.alert-r{background:rgba(240,112,112,.08);border:1px solid rgba(240,112,112,.28)}
.alert-a{background:rgba(240,184,64,.07);border:1px solid rgba(240,184,64,.24)}
.alert-b{background:rgba(91,156,246,.07);border:1px solid rgba(91,156,246,.22)}
.ai{font-size:17px;flex-shrink:0;margin-top:1px}
.att{font-size:13px;font-weight:700;margin-bottom:3px}
.alert-r .att{color:var(--red)} .alert-a .att{color:var(--amber)} .alert-b .att{color:var(--accent)}
.ab{font-size:12px;color:var(--t2)}
.fc{background:rgba(240,112,112,.1);border:1px solid rgba(240,112,112,.22);border-radius:8px;padding:9px 12px;margin-top:7px}
.fn{font-weight:600;color:#fca5a5;font-size:13px}
.fi{font-size:11px;color:var(--red);margin-top:2px}
.ft{font-size:11px;color:var(--amber);margin-top:2px}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;gap:4px}
.pill-g{background:rgba(76,206,111,.13);color:var(--green);border:1px solid rgba(76,206,111,.25)}
.pill-r{background:rgba(240,112,112,.12);color:var(--red);border:1px solid rgba(240,112,112,.26)}
.pill-b{background:rgba(91,156,246,.13);color:var(--accent);border:1px solid rgba(91,156,246,.25)}
.pill-a{background:rgba(240,184,64,.11);color:var(--amber);border:1px solid rgba(240,184,64,.25)}
.pill-gy{background:rgba(120,120,120,.18);color:var(--t2);border:1px solid rgba(120,120,120,.28)}
.pill-p{background:rgba(167,139,250,.13);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 17px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--accentd)}
.btn-g{background:var(--greend);color:#fff}.btn-g:hover{background:#24883e}
.btn-o{background:transparent;color:var(--t2);border:1px solid var(--border2)}.btn-o:hover{border-color:var(--accent);color:var(--t1)}
.btn-pur{background:rgba(167,139,250,.18);color:var(--purple);border:1px solid rgba(167,139,250,.3)}.btn-pur:hover{background:rgba(167,139,250,.28)}
.btn-teal{background:rgba(56,197,160,.15);color:var(--teal);border:1px solid rgba(56,197,160,.3)}.btn-teal:hover{background:rgba(56,197,160,.25)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn-del{background:rgba(240,112,112,.13);color:var(--red);border:1px solid rgba(240,112,112,.27)}.btn-del:hover{background:rgba(240,112,112,.23)}
.btn-edit{background:rgba(91,156,246,.13);color:var(--accent);border:none}.btn-edit:hover{background:rgba(91,156,246,.22)}
.btn-pdf{background:rgba(76,206,111,.12);color:var(--green);border:none}.btn-pdf:hover{background:rgba(76,206,111,.22)}
.btn-eye{background:rgba(91,156,246,.1);color:var(--accent);border:none}.btn-eye:hover{background:rgba(91,156,246,.2)}
.fsec{background:var(--card2);border:1px solid var(--border);border-radius:var(--rl);padding:17px 17px 13px;margin-bottom:13px}
.fsh{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.fst{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:7px}
.fg{display:grid;gap:11px}
.fg2{grid-template-columns:1fr 1fr} .fg3{grid-template-columns:1fr 1fr 1fr} .fg4{grid-template-columns:1fr 1fr 1fr 1fr}
.full{grid-column:1/-1}
.fl{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px}
.fi2{display:flex;flex-direction:column}
.fhint{font-size:11px;color:var(--t4);margin-top:3px}
.pax-slot{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;position:relative;transition:border-color .2s}
.pax-slot.linked{border-color:rgba(76,206,111,.45)}
.psh{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.pnum{display:flex;align-items:center;gap:7px}
.pnb{width:21px;height:21px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.plbl{font-size:12px;font-weight:700;color:var(--accent)}
.psug{position:absolute;z-index:500;background:var(--card);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-height:188px;overflow-y:auto;top:calc(100% + 3px);left:0;box-shadow:var(--sh2)}
.po{padding:9px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.po:hover{background:var(--card2)}
.pon{font-weight:600;color:var(--t1)} .poc{font-size:11px;color:var(--t3)}
.mc{font-size:11px;color:var(--t3);margin-top:7px;padding:6px 10px;background:rgba(0,0,0,.2);border-radius:7px;display:flex;gap:16px;flex-wrap:wrap}
.pvb{background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center;margin-top:12px}
.pvl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.pvv{font-size:15px;font-weight:700}
.pvd{border-left:1px solid var(--border)}
.tbl-wrap{overflow-x:auto}
.tbl{font-size:12px}
.tbl thead th{text-align:left;padding:10px 12px;color:var(--t3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
.tbl thead th:hover{color:var(--accent)}
.tbl tbody tr{border-bottom:1px solid rgba(60,60,60,.5);transition:background .1s}
.tbl tbody tr.tc{cursor:pointer}
.tbl tbody tr.tc:hover td{background:rgba(91,156,246,.05)}
.tbl tbody tr.loss td{background:rgba(240,112,112,.04)}
.tbl tbody tr.loss:hover td{background:rgba(240,112,112,.08)}
.tbl td{padding:10px 12px;vertical-align:middle}
.tacts{display:flex;gap:4px;justify-content:flex-end}
.si{font-size:10px;opacity:.55}
.detail-row td{padding:0!important}
.dpanel{padding:13px 15px;background:var(--surface);border-top:1px solid var(--border)}
.dpgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:8px;margin-top:10px}
.dpc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.dpn{font-weight:600;color:var(--t1);font-size:13px}
.dpc2{font-size:10px;color:var(--t3);margin-top:1px}
.dpf{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.dfi{font-size:11px} .dfl{color:var(--t3)} .dfv{font-weight:600}
.ch-wrap{position:relative;width:100%}
canvas{display:block;width:100%}
.ch-tip{position:absolute;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:12px;pointer-events:none;display:none;z-index:50;white-space:nowrap;line-height:1.6}
.ch-leg{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.cli{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3)}
.cld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.modal-bg{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.73);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh2)}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:15px 19px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1;border-radius:18px 18px 0 0}
.mttl{font-size:15px;font-weight:700}
.mx{background:none;border:none;color:var(--t3);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:6px}
.mx:hover{color:var(--t1);background:var(--card2)}
.mbody{padding:19px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:15px;padding-top:13px;border-top:1px solid var(--border)}
.ph{margin-bottom:19px}
.phr{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.ptt{font-size:20px;font-weight:800;letter-spacing:-.02em}
.pts{font-size:12px;color:var(--t3);margin-top:3px}
.empty{text-align:center;padding:48px 16px;color:var(--t3)}
.ei{font-size:32px;margin-bottom:10px}
.et{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:4px}
.sw{position:relative}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.5}
.sinp{padding-left:33px!important}
.fbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 15px}
.sep{height:1px;background:var(--border);margin:14px 0}

/* ═══════════════════════════════════════
   ORÇAMENTO TAB STYLES
═══════════════════════════════════════ */
.orc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.orc-item{display:flex;flex-direction:column;gap:5px}
.orc-preview{background:var(--surface);border:2px solid var(--border2);border-radius:14px;padding:24px;margin-top:14px;position:relative;overflow:hidden}
.orc-preview::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#2a6fda,#1da0e8,#4cce6f)}
.orc-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(91,156,246,.13);color:var(--accent);border:1px solid rgba(91,156,246,.25);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;margin-bottom:16px;text-transform:uppercase;letter-spacing:.05em}
.orc-dest{font-size:22px;font-weight:800;color:var(--t1);margin-bottom:4px}
.orc-cidades{font-size:13px;color:var(--t3);margin-bottom:16px}
.orc-info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.orc-info-box{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;text-align:center}
.orc-info-ico{font-size:18px;margin-bottom:4px}
.orc-info-val{font-size:13px;font-weight:700;color:var(--t1)}
.orc-info-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.orc-valor{background:linear-gradient(135deg,rgba(76,206,111,.12),rgba(56,197,160,.08));border:1px solid rgba(76,206,111,.25);border-radius:12px;padding:16px 20px;text-align:center;margin-bottom:16px}
.orc-valor-lbl{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.orc-valor-val{font-size:28px;font-weight:800;color:var(--green);letter-spacing:-.02em}
.orc-valor-sub{font-size:11px;color:var(--t3);margin-top:3px}
.orc-obs{background:rgba(91,156,246,.06);border:1px solid rgba(91,156,246,.18);border-radius:10px;padding:12px 15px}
.orc-obs-ttl{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em}
.orc-obs-body{font-size:12px;color:var(--t2);line-height:1.65}
.orc-hist-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.orc-hist-row:last-child{border:none}


/* JSONBIN SYNC */
.jb-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--r);background:transparent;color:var(--t3);border:1px solid var(--border2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.jb-btn:hover{border-color:var(--accent);color:var(--t1)}
.jb-btn.ok{border-color:rgba(76,206,111,.4);color:var(--green)}
.jb-btn.syncing{border-color:rgba(240,184,64,.4);color:var(--amber)}
.jb-btn.err{border-color:rgba(240,112,112,.4);color:var(--red)}
.jb-dot{width:7px;height:7px;border-radius:50%;background:var(--t4);flex-shrink:0;transition:background .3s}
.jb-dot.ok{background:var(--green)}
.jb-dot.syncing{background:var(--amber);animation:pulse .8s infinite}
.jb-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* GOOGLE DRIVE SYNC */
.drive-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--t2);transition:all .15s;white-space:nowrap}
.drive-btn:hover{border-color:#4285f4;color:#4285f4}
.drive-btn.connected{border-color:rgba(76,206,111,.4);color:var(--green);background:rgba(76,206,111,.08)}
.drive-btn.syncing{opacity:.7;pointer-events:none}
.drive-status{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px}
.drive-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.drive-dot.ok{background:var(--green)}.drive-dot.off{background:var(--t4)}.drive-dot.err{background:var(--red)}
.drive-dot.spin{background:var(--amber);animation:gdspin .8s infinite}
@keyframes gdspin{0%,100%{opacity:1}50%{opacity:.3}}
/* ═══════════════════════════════════════
   PRINT STYLES
═══════════════════════════════════════ */
@media print{
  body,#app,#login-screen{display:none!important}
  #print-root{display:block!important}
  .no-print{display:none!important}
}
#print-root{display:none}


/* ═══════════════════════════════════════
   PARCELAS MODULE
═══════════════════════════════════════ */
.par-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:0;overflow:hidden;margin-bottom:12px}
.par-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.par-card-hdr:hover{background:var(--card2)}
.par-card-info{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.par-card-nome{font-weight:700;font-size:14px;color:var(--t1)}
.par-card-sub{font-size:11px;color:var(--t3);margin-top:2px}
.par-prog{display:flex;align-items:center;gap:10px;flex-shrink:0}
.par-prog-bar{width:100px;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.par-prog-fill{height:7px;border-radius:4px;transition:width .4s}
.par-prog-txt{font-size:11px;font-weight:700;color:var(--t2);white-space:nowrap}
.par-body{padding:16px}
.par-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:12px}
.par-stat{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 13px;text-align:center}
.par-stat-val{font-size:17px;font-weight:800;letter-spacing:-.01em}

<script>
"use strict";
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
var CFG={pw:"634857",sk:"mapp9_sess",kp:"mapp9_pax",kv:"mapp9_v",ko:"mapp9_orc",kpar:"mapp9_par",kmil:"mapp9_mil"};

// ─────────────────────────────────────────────

var DB={pax:[],v:[],orc:[],par:[],mil:[]};
var JB={
  apiKey: localStorage.getItem("mapp_jb_key")||"",

var pg="dash",editId=null,editOrcId=null,expId=null;
var sortV={c:"dataEmissao",d:-1},sortP={c:"nome",d:1},sortO={c:"criadoEm",d:-1};
var fB="",fM="",fE="";

var fPN=1;
var MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ─────────────────────────────────────────────
//  AUTH
// ─────────────────────────────────────────────
function login(){
  var pw=document.getElementById("pw").value;
  var stored=localStorage.getItem("mapp9_pw")||CFG.pw;
  if(pw===stored){
    localStorage.setItem(CFG.sk,"1");
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").classList.add("on");
    document.getElementById("pw").value="";
    document.getElementById("pw-err").textContent="";
    initApp();
  } else {
    var e=document.getElementById("pw-err");
    e.textContent="Senha incorreta.";
    document.getElementById("pw").select();
    setTimeout(function(){e.textContent=""},2500);
  }
}
function logout(){
  if(!confirm("Deseja sair?"))return;
  localStorage.removeItem(CFG.sk);
  document.getElementById("app").classList.remove("on");
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("pw").value="";
}

// ─────────────────────────────────────────────
//  STORAGE
// ─────────────────────────────────────────────
function loadDB(){
  try{
    var p=localStorage.getItem(CFG.kp),v=localStorage.getItem(CFG.kv),o=localStorage.getItem(CFG.ko),par=localStorage.getItem(CFG.kpar),mil=localStorage.getItem(CFG.kmil);
    if(p)DB.pax=JSON.parse(p);
    if(v)DB.v=JSON.parse(v);
    if(o)DB.orc=JSON.parse(o);
    if(par)DB.par=JSON.parse(par);
    if(mil)DB.mil=JSON.parse(mil);
  }catch(e){}
}
function saveDB(){
  try{
    localStorage.setItem(CFG.kp,JSON.stringify(DB.pax));
    localStorage.setItem(CFG.kv,JSON.stringify(DB.v));
    localStorage.setItem(CFG.ko,JSON.stringify(DB.orc));
    localStorage.setItem(CFG.kpar,JSON.stringify(DB.par));
    localStorage.setItem(CFG.kmil,JSON.stringify(DB.mil));
  }catch(e){}
  if(typeof jbAutoSave==="function") jbAutoSave();
}

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function tod(){return new Date().toISOString().slice(0,10)}
function fmt(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function fmtN(v){return Number(v||0).toLocaleString("pt-BR")}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function dH(d){if(!d)return 1e9;return(new Date(d+"T00:00:00")-new Date())/3600000}
function fD(s){if(!s||s==="—")return"—";var p=s.split("-");return p.length===3?p[2]+"/"+p[1]+"/"+p[0]:"—"}
function mCPF(s){var c=String(s||"").replace(/\D/g,"").slice(0,11);return c.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,"$1.$2.$3-$4").replace(/(\d{3})(\d{3})(\d{1,3})/,"$1.$2.$3").replace(/(\d{3})(\d{1,3})/,"$1.$2")}
function gv(k){var e=document.getElementById(k);return e?e.value.trim():""}
function gn(k){
  var v=gv(k);
  if(!v)return 0;
  var el=document.getElementById(k);
  // If field has dataset.raw (masked field), use that directly
  if(el&&el.dataset&&el.dataset.raw&&el.dataset.raw!="0"){
    return Number(el.dataset.raw)||0;
  }
  // Plain number string (unmasked)
  var n=Number(v.replace(/\./g,"").replace(",","."));
  // Sanity check: if too large, might be milhas-style (dots as thousand sep)
  return isNaN(n)?Number(v)||0:n;
}
function getNomes(v){
  if(v.paxList&&v.paxList.length)return v.paxList.map(function(p){return p.nome||"Pax"}).join(", ");
  return v.paxNome||"—";
}

// ─────────────────────────────────────────────
//  FINANCEIRO
//  Lucro = Venda - (TotalMilhas * CPM / 1000) - TotalTaxas
// ─────────────────────────────────────────────
function calcV(v){
  var cpm=Number(v.cpm||0);
  var pl=v.paxList&&v.paxList.length?v.paxList:[];
  var tM=pl.reduce(function(s,p){return s+Number(p.milhas||0)},0)||(Number(v.milhas||0));
  var tT=pl.reduce(function(s,p){return s+Number(p.taxas||0)},0)||(Number(v.taxas||0));
  var cM=(tM*cpm)/1000, cT=cM+tT, luc=Number(v.venda||0)-cT;
  return{cpm,tM,tT,cM,cT,luc};
}

  {id:"orc",lbl:"Orçamentos",ico:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>'},
  {id:"pax",lbl:"Passageiros",ico:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="7" r="4"/><path d="M4 21v-1a8 8 0 0116 0v1"/></svg>'},
  {id:"hist",lbl:"Histórico",ico:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>'},
  {id:"mil",lbl:"Banco Milhas",ico:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/><path d="M8 12h4"/></svg>'},
  {id:"par",lbl:"Parcelas",ico:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><path d="M6 15h4M14 15h4"/></svg>'},
  {id:"cfg",lbl:"Config",ico:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>'},
];

function buildNav(){
  document.getElementById("nav").innerHTML=TABS.map(function(t){
    var b=(t.id==="dash"||t.id==="par")?'<span id="nb-'+t.id+'" class="nbadge" style="display:none">0</span>':"";
    return'<button class="nb'+(pg===t.id?" on":"")+'" id="nav-'+t.id+'" onclick="goTo(\''+t.id+'\')">'+t.ico+'<span class="nlbl">'+t.lbl+"</span>"+b+"</button>";
  }).join("");
}

function goTo(p){
  pg=p;
  document.querySelectorAll(".pg").forEach(function(e){e.classList.remove("on")});
  document.querySelectorAll(".nb").forEach(function(e){e.classList.remove("on")});
  var pe=document.getElementById("pg-"+p),ne=document.getElementById("nav-"+p);
  if(pe)pe.classList.add("on");if(ne)ne.classList.add("on");
  updB();
  if(p==="dash")rDash();
  else if(p==="venda")rVenda(null);
  else if(p==="orc")rOrc();
  else if(p==="pax")rPax();
  else if(p==="hist")rHist();
  else if(p==="mil")rMil();
  else if(p==="par")rPar();
  else if(p==="cfg")rCfg();
}

function updB(){
  // Parcelas vencidas ou vencendo hoje
  var hoje=new Date(); hoje.setHours(0,0,0,0);
  var nPar=DB.par.reduce(function(s,p){
    return s+p.parcelas.filter(function(x){
      if(x.paga)return false;
      var d=new Date(x.vencimento+"T00:00:00");
      return d<=hoje;
    }).length;
  },0);
  var elP=document.getElementById("nb-par");
  if(elP){elP.textContent=nPar;elP.style.display=nPar>0?"flex":"none";}

  var n=DB.v.filter(function(v){var ha=dH(v.dataIda),hv=dH(v.dataVolta);return(ha>=0&&ha<=48)||(hv>=0&&hv<=48)}).length;
  var el=document.getElementById("nb-dash");
  if(el){el.textContent=n;el.style.display=n>0?"flex":"none"}
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openM(t,h){document.getElementById("mttl").textContent=t;document.getElementById("mbody").innerHTML=h;document.getElementById("modal-bg").style.display="flex"}
function closeM(){document.getElementById("modal-bg").style.display="none"}

// ─────────────────────────────────────────────
//  DASHBOARD
// ─────────────────────────────────────────────
function rDash(){
  var anos=[];for(var y=2023;y<=2027;y++)anos.push(y);
  var prox=DB.v.filter(function(v){var ha=dH(v.dataIda),hv=dH(v.dataVolta);return(ha>=0&&ha<=48)||(hv>=0&&hv<=48)});
  var mesStr=(dA+'-'+(dM+1<10?'0':'')+(dM+1));var vmes=DB.v.filter(function(v){if(!v.dataEmissao)return false;return v.dataEmissao.startsWith(mesStr)});
  var tL=0,tR=0,tC=0;

function drawC(cid,tid,data){
  var cv=document.getElementById(cid);if(!cv)return;
  var dpr=window.devicePixelRatio||1,W=cv.parentElement.offsetWidth||480,H=200;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+"px";cv.style.height=H+"px";
  var ctx=cv.getContext("2d");ctx.scale(dpr,dpr);
  var p={t:10,r:10,b:32,l:62},cw=W-p.l-p.r,ch=H-p.t-p.b;
  var all=data.reduce(function(a,d){return a.concat([d.r,d.l,0]);},[]);
  var mx=Math.max.apply(null,all.concat([100])),mn=Math.min.apply(null,all.concat([0])),rng=mx-mn||1;
  function ty(v){return p.t+ch-((v-mn)/rng*ch)}
  function rr(ctx,x,y,w,h,r){if(h<=0)return;ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
  for(var i=0;i<=4;i++){var v=mn+(rng/4*i),y=ty(v);ctx.strokeStyle="rgba(100,100,100,.6)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle="#8a8a8a";ctx.font="10px Segoe UI,system-ui";ctx.textAlign="right";ctx.fillText("R$"+(Math.abs(v)>=1000?(v/1000).toFixed(1)+"k":Math.round(v)),p.l-4,y+3)}
  if(mn<0){var zy=ty(0);ctx.save();ctx.strokeStyle="rgba(240,112,112,.4)";ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(p.l,zy);ctx.lineTo(W-p.r,zy);ctx.stroke();ctx.restore()}
  var n=data.length,gW=cw/n,bW=Math.min(gW*.32,22),zy2=ty(0);
  data.forEach(function(d,i){var cx=p.l+i*gW+gW/2;var ry=ty(d.r),rh=Math.max(Math.abs(zy2-ry),2);ctx.fillStyle="#4a5a70";rr(ctx,cx-bW-2,Math.min(ry,zy2),bW,rh,3);ctx.fill();var ly=ty(d.l),lh=Math.max(Math.abs(zy2-ly),2);ctx.fillStyle=d.l>=0?"#4cce6f":"#f07070";rr(ctx,cx+2,Math.min(ly,zy2),bW,lh,3);ctx.fill();ctx.fillStyle="#888";ctx.font="11px Segoe UI,system-ui";ctx.textAlign="center";ctx.fillText(d.mes,cx,H-p.b+12)});
  cv.onmousemove=function(e){var rect=cv.getBoundingClientRect(),mx2=e.clientX-rect.left;var tip=document.getElementById(tid);var found=false;data.forEach(function(d,i){var cx=p.l+i*gW+gW/2;if(Math.abs(mx2-cx)<gW/2){tip.innerHTML="<b>"+d.mes+"</b><br>Receita: "+fmt(d.r)+"<br>Lucro: <span style=\"color:"+(d.l>=0?"#4cce6f":"#f07070")+'">'+fmt(d.l)+"</span>";tip.style.display="block";tip.style.left=Math.min(mx2+10,W-150)+"px";tip.style.top="6px";found=true}});if(!found)tip.style.display="none"};
  cv.onmouseleave=function(){var t=document.getElementById(tid);if(t)t.style.display="none"};
}

function togV(){
  var t=document.getElementById("vf-tipo")?document.getElementById("vf-tipo").value:"ida";
  var vg=document.getElementById("vg"),vi=document.getElementById("vf-dvolta");
  var lida=document.getElementById("lbl-dida"),lv=document.getElementById("lbl-dvolta");
  if(!vg||!vi)return;
  var needsVolta=(t==="idavolta"||t==="hospedagem");
  vg.style.opacity=needsVolta?"1":".35";
  vi.disabled=!needsVolta;
  if(!needsVolta)vi.value="";
  if(lida)lida.textContent=t==="hospedagem"?"Data de Check-in ★":"Data de Ida ★";
  if(lv)lv.textContent=t==="hospedagem"?"Data de Check-out":"Data de Volta";
}

function rSlots(arr){
  fPN=arr.length;
  document.getElementById("pax-slots").innerHTML=arr.map(function(p,i){return bSlot(i,p)}).join("");
  arr.forEach(function(_,i){bndSlot(i)});
  setTimeout(applyNumMasks,80);
}

  var pO=DB.pax.map(function(px){return'<option value="'+px.id+'"'+(p.paxId===px.id?" selected":"")+">"+esc(px.nome)+(px.cpf?" — "+mCPF(px.cpf):"")+("</option>")}).join("");
  return'<div class="pax-slot'+(linked?" linked":"")+'" id="slot-'+idx+'">'+
    '<div class="psh"><div class="pnum"><div class="pnb">'+(idx+1)+'</div><span class="plbl">Passageiro '+(idx+1)+'</span></div>'+
    (DB.pax.length?'<select id="sel-'+idx+'" style="max-width:250px;font-size:12px;padding:5px 8px;width:auto" onchange="onSel('+idx+',this.value)"><option value="">— Selecionar salvo —</option>'+pO+'</select>':'<span style="font-size:11px;color:var(--t3)">Sem passageiros cadastrados</span>')+
    '</div>'+
    '<div class="fg fg3" style="margin-bottom:8px">'+
      '<div class="fi2" style="position:relative"><label class="fl">Nome ★</label><input id="pn-'+idx+'" placeholder="Nome no bilhete" value="'+esc(p.nome||"")+'" autocomplete="off" oninput="onNI('+idx+',this.value)"><div id="ps-'+idx+'" class="psug" style="display:none"></div></div>'+
      '<div class="fi2"><label class="fl">CPF</label><input id="pc-'+idx+'" placeholder="000.000.000-00" value="'+mCPF(p.cpf||"")+'" oninput="this.value=mCPF(this.value)"></div>'+
      '<div class="fi2"><label class="fl">Data de Nascimento</label><input type="date" id="pnasc-'+idx+'" value="'+(p.nascimento||'')+'"></div>'+
    '</div>'+
    '<div class="fg fg2">'+
      '<div class="fi2"><label class="fl">Milhas</label><input type="text" inputmode="numeric" id="pm-'+idx+'" placeholder="Ex: 50.000" value="'+(p.milhas?Number(p.milhas).toLocaleString('pt-BR'):"")+'" oninput="maskMilhas(this);calcPv()"></div>'+
      '<div class="fi2"><label class="fl">Taxas R$</label><input type="text" inputmode="numeric" id="pt-'+idx+'" placeholder="Ex: 160,00" value="'+(p.taxas?Number(p.taxas).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):"")+'" oninput="maskMoeda(this);calcPv()"></div>'+
    '</div>'+
    '<div class="mc" id="pca-'+idx+'"><span><span style="color:var(--t3)">Custo milhas:</span> <b id="pcm-'+idx+'">—</b></span><span><span style="color:var(--t3)">Custo total:</span> <b id="pct-'+idx+'">—</b></span></div>'+
  '</div>';
}

function bndSlot(idx){
  document.addEventListener("click",function(e){
    var inp=document.getElementById("pn-"+idx),sug=document.getElementById("ps-"+idx);
    if(inp&&sug&&!inp.contains(e.target)&&!sug.contains(e.target))sug.style.display="none";
  });
}

function onNI(idx,val){
  var sug=document.getElementById("ps-"+idx);if(!sug)return;
  var q=val.toLowerCase().trim();
  if(!q){sug.style.display="none";return}
  var qDigits=q.replace(/\D/g,"");
  var m=DB.pax.filter(function(p){
    var nomeMatch=p.nome.toLowerCase().startsWith(q);
    var cpfMatch=qDigits.length>=3&&(p.cpf||"").startsWith(qDigits);
    return nomeMatch||cpfMatch;
  }).slice(0,10);
  if(!m.length){sug.style.display="none";return}
  sug.innerHTML=m.map(function(p){return'<div class="po" onclick="fillS('+idx+',\''+p.id+'\')"><div><div class="pon">'+esc(p.nome)+'</div><div class="poc">'+mCPF(p.cpf)+(p.nascimento?' &nbsp;•&nbsp; Nasc.: '+fD(p.nascimento):'')+'</div></div><span class="pill pill-b" style="font-size:10px">Usar</span></div>'}).join("");
  sug.style.display="block";
}

function onSel(idx,pid){if(pid)fillS(idx,pid)}

function fillS(idx,pid){
  var p=DB.pax.find(function(x){return x.id===pid});if(!p)return;
  var ni=document.getElementById("pn-"+idx),ci=document.getElementById("pc-"+idx),sg=document.getElementById("ps-"+idx),sl=document.getElementById("sel-"+idx);
  if(ni)ni.value=p.nome;if(ci)ci.value=mCPF(p.cpf);var nasc=document.getElementById("pnasc-"+idx);if(nasc)nasc.value=p.nascimento||"";if(sg)sg.style.display="none";if(sl)sl.value=pid;
  var s=document.getElementById("slot-"+idx);if(s)s.classList.add("linked");
}

function onQtd(val){
  var n=Math.max(1,Math.min(20,parseInt(val)||1));
  var cur=rdSlots();
  while(cur.length<n)cur.push({nome:"",cpf:"",paxId:"",milhas:"",taxas:""});
  cur=cur.slice(0,n);fPN=n;rSlots(cur);calcPv();
}

function rdSlots(){
  var arr=[];
  for(var i=0;i<fPN;i++){var sl=document.getElementById("sel-"+i);arr.push({nome:(document.getElementById("pn-"+i)||{value:""}).value||"",cpf:((document.getElementById("pc-"+i)||{value:""}).value||"").replace(/\D/g,""),paxId:sl?sl.value:"",nascimento:(document.getElementById("pnasc-"+i)||{value:""}).value||"",milhas:(function(){var e=document.getElementById("pm-"+i);if(!e)return 0;if(e.dataset&&e.dataset.raw)return Number(e.dataset.raw)||0;return Number((e.value||"0").replace(/\./g,"").replace(",","."))||0;}()),taxas:(function(){var e=document.getElementById("pt-"+i);if(!e)return 0;if(e.dataset&&e.dataset.raw)return Number(e.dataset.raw)||0;return Number((e.value||"0").replace(/\./g,"").replace(",","."))||0;}())})}
  return arr;
}

function calcPv(){
  var cpm=gn("vf-cpm"),venda=gn("vf-venda"),tM=0,tT=0;
  for(var i=0;i<fPN;i++){
    var _em=document.getElementById("pm-"+i),_et=document.getElementById("pt-"+i);var m=_em?((_em.dataset&&_em.dataset.raw)?Number(_em.dataset.raw)||0:Number((_em.value||"0").replace(/\./g,"").replace(",","."))||0):0;var t=_et?((_et.dataset&&_et.dataset.raw)?Number(_et.dataset.raw)||0:Number((_et.value||"0").replace(/\./g,"").replace(",","."))||0):0;
    tM+=m;tT+=t;var cm=(m*cpm)/1000,ct=cm+t;
    var ecm=document.getElementById("pcm-"+i),ect=document.getElementById("pct-"+i);
    if(ecm)ecm.textContent=m||t?fmt(cm):"—";if(ect)ect.textContent=m||t?fmt(ct):"—";
  }
  var cM=(tM*cpm)/1000,cT=cM+tT,luc=venda-cT;
  var pb=document.getElementById("pvb");if(!pb)return;
  if(!venda&&!tM){pb.innerHTML="";return}
  pb.innerHTML='<div class="pvb"><div><div class="pvl">Total Milhas</div><div class="pvv" style="color:var(--accent)">'+fmtN(tM)+'</div></div><div class="pvd"><div class="pvl">Custo Milhas</div><div class="pvv" style="color:#e8a83a">'+fmt(cM)+'</div></div><div class="pvd"><div class="pvl">Custo Total</div><div class="pvv" style="color:#e8a83a">'+fmt(cT)+'</div></div><div class="pvd"><div class="pvl">Lucro Líquido</div><div class="pvv" style="color:'+(luc>=0?"var(--green)":"var(--red)")+'">'+fmt(luc)+'</div></div></div>';
}

  var cpmEl=document.getElementById('vf-cpm');
  var saldoEl=document.getElementById('vf-milsaldo-txt');
  if(!milId){
    if(saldoEl)saldoEl.innerHTML='<span style="color:var(--t3)">Nenhuma conta selecionada</span>';
    return;
  }
  var conta=DB.mil.find(function(m){return m.id===milId});
  if(!conta)return;
  if(cpmEl){
    var cpmNum=Number(conta.cpm||0);
    cpmEl.value=cpmNum.toLocaleString('pt-BR',{minimumFractionDigits:4,maximumFractionDigits:4});
    cpmEl.dataset.raw=cpmNum.toFixed(4);
    calcPv();
  }
  if(saldoEl){
    var totalMil=0;
    var nSlots=typeof formPaxN!=="undefined"?formPaxN:1;
    for(var i=0;i<nSlots;i++){var el=document.getElementById('pmil-'+i);if(el)totalMil+=Number(el.value||0);}
    var saldoApos=Number(conta.saldo||0)-totalMil;
    saldoEl.innerHTML=
      '<b style="color:var(--accent)">'+fmtN(conta.saldo||0)+'</b> milhas disponíveis'+
      (totalMil>0?' &nbsp;→&nbsp; após emissão: <b style="color:'+(saldoApos>=0?'var(--green)':'var(--red)')+'">'+fmtN(Math.max(0,saldoApos))+'</b>':'');
  }
}

function doSave(andNew){
  var venda=gn("vf-venda"),cpm=gn("vf-cpm"),dem=gv("vf-dem");
  if(!dem){alert("Informe a Data de Emissão.");return}
  if(!venda){alert("Informe o Valor de Venda.");return}
  var pax=rdSlots();
  if(!pax[0].nome){alert("Informe o nome do 1º passageiro.");return}
  var tipo=document.getElementById("vf-tipo").value;
  var obj={
    id:editId||uid(),dataEmissao:dem,dataIda:gv("vf-dida"),dataVolta:tipo==="idavolta"?gv("vf-dvolta"):"",tipo,cia:gv("vf-cia"),origem:gv("vf-orig").toUpperCase(),destino:gv("vf-dest").toUpperCase(),localizador:gv("vf-loc"),emissor:gv("vf-em"),obs:gv("vf-obs"),info:gv("vf-info"),venda,cpm,milContaId:gv("vf-milconta")||"",paxList:pax,qtdPax:pax.length,
    paxNome:pax[0].nome,paxCPF:pax[0].cpf,paxId:pax[0].paxId,
    milhas:pax.reduce(function(s,p){return s+Number(p.milhas||0)},0),taxas:pax.reduce(function(s,p){return s+Number(p.taxas||0)},0),
    criadoEm:editId?(DB.v.find(function(v){return v.id===editId})||{}).criadoEm||new Date().toISOString():new Date().toISOString()
  };
  if(editId)DB.v=DB.v.map(function(v){return v.id===editId?obj:v});else DB.v.unshift(obj);
  if(obj.milContaId){
    var milConta=DB.mil.find(function(m){return m.id===obj.milContaId});
    if(milConta){
      var totalMilUsadas=pax.reduce(function(s,p){return s+Number(p.milhas||0)},0);
      milConta.saldo=Math.max(0,Number(milConta.saldo||0)-totalMilUsadas);
      if(!milConta.cpfs)milConta.cpfs=[];
      pax.forEach(function(p){
        if(p.cpf&&p.cpf.length>=9){
          var existeIdx=milConta.cpfs.findIndex(function(c){return (typeof c==='object'?c.cpf:c)===p.cpf;});
          if(existeIdx<0){
            milConta.cpfs.push({cpf:p.cpf,dataEmissao:obj.dataEmissao||tod(),obs:''});
          }
        }
      });
      milConta.qtdCpf=milConta.cpfs.length;
    }
  }
  saveDB();updB();
  if(andNew){editId=null;rVenda(null)}else{editId=null;goTo("hist")}
}

}

function getPV(p){return DB.v.filter(function(v){if(v.paxList&&v.paxList.length)return v.paxList.some(function(x){return(x.paxId&&x.paxId===p.id)||(x.cpf&&x.cpf===p.cpf&&p.cpf)});return v.paxId===p.id||(v.paxCPF&&v.paxCPF.replace(/\D/g,"")===p.cpf&&p.cpf)})}
function sP(col){if(sortP.c===col)sortP.d=-sortP.d;else{sortP.c=col;sortP.d=1}rPax()}

function editPax(id){
  var p=id?DB.pax.find(function(x){return x.id===id}):null;

function savPax(id){

function rHist(){
  var em=[...new Set(DB.v.map(function(v){return v.emissor}).filter(Boolean))];

//  PARCELAS — CONTROLE DE PARCELAMENTOS
// ═══════════════════════════════════════════════════
var parExpanded={};
var parFiltro="todos"; // todos | pendentes | concluidos

function rPar(){
  var hoje=new Date(); hoje.setHours(0,0,0,0);

  function statusParcela(p){
    if(p.paga) return "paga";
    var d=new Date(p.vencimento+"T00:00:00");
    if(d.getTime()===hoje.getTime()) return "hoje";
    if(d<hoje) return "vencida";
    return "futura";
  }

  function calcResumo(contrato){
    var total=contrato.parcelas.length;
    var pagas=contrato.parcelas.filter(function(p){return p.paga}).length;
    var vencidas=contrato.parcelas.filter(function(p){return statusParcela(p)==="vencida"}).length;
    var hoje2=contrato.parcelas.filter(function(p){return statusParcela(p)==="hoje"}).length;
    var valPago=contrato.parcelas.filter(function(p){return p.paga}).reduce(function(s,p){return s+p.valor},0);
    var valPend=contrato.parcelas.filter(function(p){return !p.paga}).reduce(function(s,p){return s+p.valor},0);
    return{total,pagas,vencidas,hoje:hoje2,valPago,valPend,pct:total?Math.round(pagas/total*100):0};
  }

  // Totais gerais
  var totalReceber=0,totalRecebido=0,totalVencido=0,totalHoje=0;
  DB.par.forEach(function(c){
    var r=calcResumo(c);
    totalRecebido+=r.valPago;
    totalReceber+=r.valPend;
    totalVencido+=c.parcelas.filter(function(p){return statusParcela(p)==="vencida"}).reduce(function(s,p){return s+p.valor},0);
    totalHoje+=c.parcelas.filter(function(p){return statusParcela(p)==="hoje"}).reduce(function(s,p){return s+p.valor},0);
  });

  // Filtro
  var lista=DB.par.filter(function(c){
    if(parFiltro==="pendentes"){var r=calcResumo(c);return r.pagas<r.total;}
    if(parFiltro==="concluidos"){var r=calcResumo(c);return r.pagas===r.total&&r.total>0;}
    return true;
  }).slice().sort(function(a,b){
    // Sort: vencidas/hoje primeiro, depois por próximo vencimento
    var aNext=a.parcelas.filter(function(p){return !p.paga}).map(function(p){return p.vencimento}).sort()[0]||"9999";
    var bNext=b.parcelas.filter(function(p){return !p.paga}).map(function(p){return p.vencimento}).sort()[0]||"9999";
    return aNext<bNext?-1:aNext>bNext?1:0;
  });

  var fBtns=['<button class="btn btn-sm '+(parFiltro==="todos"?"btn-p":"btn-o")+'" onclick="parFiltro=\'todos\';rPar()">Todos ('+DB.par.length+')</button>',
    '<button class="btn btn-sm '+(parFiltro==="pendentes"?"btn-p":"btn-o")+'" onclick="parFiltro=\'pendentes\';rPar()">Em aberto</button>',
    '<button class="btn btn-sm '+(parFiltro==="concluidos"?"btn-p":"btn-o")+'" onclick="parFiltro=\'concluidos\';rPar()">Concluídos</button>',
  ].join("");

  var alertaVenc="";
  var numVenc=DB.par.reduce(function(s,c){return s+c.parcelas.filter(function(p){return statusParcela(p)==="vencida"}).length},0);
  var numHoje=DB.par.reduce(function(s,c){return s+c.parcelas.filter(function(p){return statusParcela(p)==="hoje"}).length},0);
  if(numVenc>0||numHoje>0){
    alertaVenc='<div class="alert alert-r" style="margin-bottom:14px"><span class="ai">⚠️</span><div>'+
      '<div class="att">Atenção: Parcelas Pendentes</div>'+
      '<div class="ab">'+
        (numVenc>0?'<b style="color:var(--red)">'+numVenc+' parcela(s) vencida(s)</b> &nbsp;':'') +
        (numHoje>0?'<b style="color:var(--amber)">'+numHoje+' parcela(s) vencem hoje</b>':'') +
      '</div></div></div>';
  }

  var cards=lista.length===0?
    '<div class="empty"><div class="ei">💳</div><div class="et">Nenhum parcelamento'+(parFiltro!=="todos"?" neste filtro":""+'cadastrado')+'</div><div>Clique em "+ Novo Parcelamento"</div></div>':
    lista.map(function(c){
      var r=calcResumo(c);
      var isExp=!!parExpanded[c.id];
      var barColor=r.pct===100?"var(--green)":r.vencidas>0?"var(--red)":r.hoje>0?"var(--amber)":"var(--accent)";
      var statusBadge=r.pct===100?'<span class="pill pill-g">✓ Quitado</span>':
        r.vencidas>0?'<span class="pill pill-r">'+r.vencidas+' vencida(s)</span>':
        r.hoje>0?'<span class="pill pill-a">Vence hoje</span>':'';

      var parcItems=isExp?c.parcelas.map(function(p,i){
        var st=statusParcela(p);
        var diasInfo="";
        if(!p.paga){
          var dv=new Date(p.vencimento+"T00:00:00");
          var diff=Math.round((dv-hoje)/86400000);
          if(diff>0)diasInfo=' — em '+diff+'d';
          else if(diff<0)diasInfo=' — '+Math.abs(diff)+'d atrás';
          else diasInfo=' — hoje';
        }
        return'<div class="parc-item '+st+'">'+
          '<div class="parc-num '+st+'">'+(i+1)+'</div>'+
          '<div class="parc-info">'+
            '<div class="parc-val">'+fmt(p.valor)+'</div>'+
            '<div class="parc-dt">Venc.: '+fD(p.vencimento)+diasInfo+(p.dataPagamento?' &nbsp;• Pago em: '+fD(p.dataPagamento):'' )+'</div>'+
          '</div>'+
          '<span class="parc-status '+st+'">'+
            (st==="paga"?"✓ Pago":st==="vencida"?"Vencida":st==="hoje"?"Hoje":"Pendente")+
          '</span>'+
          '<button class="parc-toggle '+(p.paga?"unmark":"mark")+'" onclick="toggleParcela(\''+c.id+'\','+i+')">'+
            (p.paga?"✗ Desmarcar":"✓ Marcar pago")+
          '</button>'+
        '</div>';
      }).join(""):"";

      return'<div class="par-card">'+
        '<div class="par-card-hdr" onclick="parExpanded[\''+c.id+'\']=!parExpanded[\''+c.id+'\'];rPar()">'+
          '<div class="par-card-info">'+
            '<div>'+
              '<div style="display:flex;align-items:center;gap:8px">'+
                '<div class="par-card-nome">'+esc(c.nome)+'</div>'+statusBadge+
              '</div>'+
              '<div class="par-card-sub">'+
                (function(){var px=c.paxId?DB.pax.find(function(p){return p.id===c.paxId}):null;return px?'<span style="color:var(--accent);font-size:10px">'+mCPF(px.cpf)+'</span> &nbsp;•&nbsp; ':'';}())+
                (c.descricao?esc(c.descricao)+' &nbsp;•&nbsp; ':'')+
                r.pagas+'/'+r.total+' parcelas &nbsp;•&nbsp; '+
                'Pago: '+fmt(r.valPago)+' &nbsp;•&nbsp; A receber: <b style="color:'+(r.valPend>0?"var(--amber)":"var(--green)")+'">'+fmt(r.valPend)+'</b>'+
                (c.venda?'  &nbsp;•&nbsp; <span style="color:var(--accent);font-size:10px">Venda vinculada</span>':'')+
              '</div>'+
            '</div>'+
          '</div>'+
          '<div style="display:flex;align-items:center;gap:10px">'+
            '<div class="par-prog">'+
              '<div class="par-prog-bar"><div class="par-prog-fill" style="width:'+r.pct+'%;background:'+barColor+'"></div></div>'+
              '<span class="par-prog-txt">'+r.pct+'%</span>'+
            '</div>'+
            '<div style="display:flex;gap:4px" onclick="event.stopPropagation()">'+
              '<button class="btn btn-edit btn-xs" onclick="openParModal(\''+c.id+'\')">✎</button>'+
              '<button class="btn btn-del btn-xs" onclick="delPar(\''+c.id+'\')">🗑</button>'+
            '</div>'+
            '<span style="font-size:12px;color:var(--t3);margin-left:4px">'+(isExp?"▲":"▼")+'</span>'+
          '</div>'+
        '</div>'+
        (isExp?
          '<div class="par-body">'+
            '<div class="par-grid">'+
              '<div class="par-stat"><div class="par-stat-val">'+r.total+'</div><div class="par-stat-lbl">Total parcelas</div></div>'+
              '<div class="par-stat"><div class="par-stat-val" style="color:var(--green)">'+r.pagas+'</div><div class="par-stat-lbl">Pagas</div></div>'+
              '<div class="par-stat"><div class="par-stat-val" style="color:var(--red)">'+(r.total-r.pagas)+'</div><div class="par-stat-lbl">Pendentes</div></div>'+
              '<div class="par-stat"><div class="par-stat-val" style="color:var(--amber)">'+fmt(c.valorTotal)+'</div><div class="par-stat-lbl">Valor Total</div></div>'+
            '</div>'+
            '<div class="parc-list">'+parcItems+'</div>'+
          '</div>':'')+'</div>';
    }).join("");

  document.getElementById("pg-par").innerHTML=
    '<div class="ph"><div class="phr">'+
      '<div><div class="ptt">Controle de Parcelamentos</div><div class="pts">Gerencie cobranças parceladas, marque parcelas pagas e acompanhe inadimplência</div></div>'+
      '<button class="btn btn-p" onclick="openParModal(null)">+ Novo Parcelamento</button>'+
    '</div></div>'+
    alertaVenc+
    '<div class="par-summary-cards">'+
      '<div class="metric"><div class="ml">💳 Total a Receber</div><div class="mv" style="color:var(--amber)">'+fmt(totalReceber)+'</div></div>'+
      '<div class="metric"><div class="ml">✅ Total Recebido</div><div class="mv" style="color:var(--green)">'+fmt(totalRecebido)+'</div></div>'+
      '<div class="metric"><div class="ml">🔴 Vencido</div><div class="mv" style="color:var(--red)">'+fmt(totalVencido)+'</div></div>'+
      '<div class="metric"><div class="ml">📅 Vence Hoje</div><div class="mv" style="color:var(--amber)">'+fmt(totalHoje)+'</div></div>'+
    '</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">'+fBtns+'</div>'+
    cards;
}

function toggleParcela(cid,idx){
  var c=DB.par.find(function(x){return x.id===cid}); if(!c)return;
  var p=c.parcelas[idx]; if(!p)return;
  p.paga=!p.paga;
  p.dataPagamento=p.paga?tod():"";
  saveDB(); updB(); rPar();
}

function delPar(id){
  if(!confirm("Excluir este parcelamento?"))return;
  DB.par=DB.par.filter(function(x){return x.id!==id});
  saveDB(); updB(); rPar();
}

      '</div>'+
      '<div class="fi2"><label class="fl">Descrição / Referência</label>'+
        '<input id="par-desc" placeholder="Ex: Viagem Europa, Pacote Cancún" value="'+esc(c?c.descricao:'')+'">'+
      '</div>'+
      '<div class="fg fg3">'+
        '<div class="fi2"><label class="fl">Valor Total (R$)</label>'+
          '<input type="number" step="0.01" id="par-total" placeholder="0,00" value="'+(c?c.valorTotal:'')+'" oninput="autoFillParc()">'+
        '</div>'+

          '<button class="btn btn-o btn-xs" onclick="autoFillDatas()">↻ Auto-preencher datas</button>'+

function rebuildParcInputs(){
  var n=Math.max(1,Math.min(60,parseInt(gv("par-nparc"))||1));
  // Read existing values
  var existing=[];
  var i=0;
  while(document.getElementById("pv-"+i)){
    existing.push({
      valor:Number(gv("pv-"+i))||0,
      vencimento:gv("pd-"+i),
      paga:document.getElementById("pp-"+i)?document.getElementById("pp-"+i).checked:false,
      dataPagamento:""
    });
    i++;
  }
  // Build new inputs
  var html='<div id="parc-inputs" style="display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;padding-right:4px">';
  for(var j=0;j<n;j++){
    var p=existing[j]||{valor:"",vencimento:"",paga:false};
    html+='<div style="display:grid;grid-template-columns:30px 1fr 1fr auto;gap:6px;align-items:center">'+
      '<div style="text-align:center;font-size:11px;font-weight:700;color:var(--t3)">'+(j+1)+'</div>'+
      '<input type="number" step="0.01" id="pv-'+j+'" placeholder="R$ valor" value="'+(p.valor||'')+'" style="padding:7px 9px;font-size:12px">'+
      '<input type="date" id="pd-'+j+'" value="'+(p.vencimento||'')+'" style="padding:7px 9px;font-size:12px">'+
      '<label style="display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap;font-size:12px;color:var(--t2)">'+
        '<input type="checkbox" id="pp-'+j+'" '+(p.paga?"checked":"")+' style="width:14px;height:14px;cursor:pointer">Pago</label>'+
    '</div>';
  }
  html+='</div>';
  var container=document.getElementById("parc-inputs");
  if(container)container.outerHTML=html;
  autoFillParc();
  autoFillDatas();
  setTimeout(applyNumMasks,80);
}

function autoFillParc(){
  var total=Number(gv("par-total"))||0;
  var n=Math.max(1,Math.min(60,parseInt(gv("par-nparc"))||1));
  if(!total)return;
  var base=Math.floor((total/n)*100)/100;
  var resto=Math.round((total-base*n)*100)/100;
  for(var i=0;i<n;i++){
    var el=document.getElementById("pv-"+i);
    if(el){el.value=i===n-1?(base+resto).toFixed(2):base.toFixed(2);}
  }
}

function autoFillDatas(){
  var data1=gv("par-data1"); if(!data1)return;
  var n=Math.max(1,Math.min(60,parseInt(gv("par-nparc"))||1));
  var d=new Date(data1+"T00:00:00");
  for(var i=0;i<n;i++){
    var el=document.getElementById("pd-"+i);
    if(el){
      var dd=new Date(d.getFullYear(),d.getMonth()+i,d.getDate());
      el.value=dd.toISOString().slice(0,10);
    }
  }
}


function parNomeSug(val){
  var sug=document.getElementById("par-nome-sug");
  var hidId=document.getElementById("par-paxid");
  if(!sug)return;
  // Clear link when user edits manually
  if(hidId)hidId.value="";
  var q=val.toLowerCase().trim();
  if(!q){sug.style.display="none";return;}
  var qDigits=q.replace(/\D/g,"");
  var m=DB.pax.filter(function(p){
    var nomeMatch=p.nome.toLowerCase().startsWith(q);
    var cpfMatch=qDigits.length>=3&&(p.cpf||"").startsWith(qDigits);
    return nomeMatch||cpfMatch;
  }).slice(0,10);
  if(!m.length){sug.style.display="none";return;}
  sug.innerHTML=m.map(function(p){
    var vs=DB.par.filter(function(c){return c.paxId===p.id}).length;
    return'<div class="po" onclick="parSelectPax(\''+p.id+'\')">'+
      '<div>'+
        '<div class="pon">'+esc(p.nome)+'</div>'+
        '<div class="poc">'+mCPF(p.cpf)+(p.nascimento?' &nbsp;•&nbsp; Nasc.: '+fD(p.nascimento):'')+
          (vs>0?' &nbsp;•&nbsp; <span style="color:var(--accent)">'+vs+' parcel.</span>':'')+
        '</div>'+
      '</div>'+
      '<span class="pill pill-b" style="font-size:10px">Selecionar</span>'+
    '</div>';
  }).join("");
  sug.style.display="block";
  // Close on outside click
  setTimeout(function(){
    document.addEventListener("click",function close(e){
      var inp=document.getElementById("par-nome");
      if(sug&&inp&&!inp.contains(e.target)&&!sug.contains(e.target)){
        sug.style.display="none";
        document.removeEventListener("click",close);
      }
    });
  },10);
}

function parSelectPax(pid){
  var p=DB.pax.find(function(x){return x.id===pid}); if(!p)return;
  var inp=document.getElementById("par-nome");
  var hid=document.getElementById("par-paxid");
  var sug=document.getElementById("par-nome-sug");
  if(inp)inp.value=p.nome;
  if(hid)hid.value=p.id;
  if(sug)sug.style.display="none";
}

function savePar(id){
  var nome=gv("par-nome"); if(!nome){alert("Informe o nome.");return;}
  var n=Math.max(1,Math.min(60,parseInt(gv("par-nparc"))||1));
  var parcelas=[];
  for(var i=0;i<n;i++){
    var val=Number(gv("pv-"+i))||0;
    var dt=gv("pd-"+i);
    var pg=document.getElementById("pp-"+i)?document.getElementById("pp-"+i).checked:false;
    if(!dt){alert("Preencha a data da parcela "+(i+1)+".");return;}
    parcelas.push({valor:val,vencimento:dt,paga:pg,dataPagamento:pg?tod():""});
  }
  var valorTotal=parcelas.reduce(function(s,p){return s+p.valor},0);
  var obj={
    id:id||uid(),
    nome:nome,
    descricao:gv("par-desc"),
    paxId:gv("par-paxid"),
    valorTotal:valorTotal,
    parcelas:parcelas,
    criadoEm:id?(DB.par.find(function(x){return x.id===id})||{}).criadoEm||new Date().toISOString():new Date().toISOString()
  };
  if(id){DB.par=DB.par.map(function(x){return x.id===id?obj:x});}
  else{DB.par.unshift(obj);}
  saveDB(); updB(); closeM(); rPar();
}

var LIMITE_CPF={
  "Smiles":20,       // renova 01/jan
  "TudoAzul":999,  // varia por categoria, sem renovacao automatica
  "Latam Pass":25,   // renova por data de emissão (12 meses)

// Retorna a data em que um CPF "libera" novamente
function cpfLibera(cpfObj, programa){
  if(!cpfObj||!cpfObj.dataEmissao)return null;
  var prog=programa||"Outro";
  var dt=new Date(cpfObj.dataEmissao+"T00:00:00");
  // Smiles: renova em 01/jan do ano seguinte
  if(prog==="Smiles"){
    return new Date(dt.getFullYear()+1,0,1);
  }
  // Demais: 12 meses após emissão
  return new Date(dt.getFullYear(),dt.getMonth()+12,dt.getDate());
}

// Badge de CPF com status
function milCpfBadge(c){
  if(typeof c==='string') c={cpf:c,dataEmissao:'',obs:''};
  var hoje=new Date(); hoje.setHours(0,0,0,0);
  var status="";
  if(c.dataEmissao){
    var lib=cpfLibera(c,"");
    if(lib){
      var diff=Math.ceil((lib-hoje)/86400000);
      if(diff<=0) status='<span style="color:var(--green);font-size:10px"> ✓ livre</span>';
      else if(diff<=30) status='<span style="color:var(--amber);font-size:10px"> ⏱ '+diff+'d</span>';
      else status='<span style="color:var(--t4);font-size:10px"> '+fD(c.dataEmissao)+'</span>';
    }
  }
  return'<span class="mil-cpf-item" title="'+(c.obs||'')+'">'+mCPF(c.cpf)+status+'</span>';
}

function calcMilConta(m){
  var compras=m.compras||[];
  var totM=compras.reduce(function(s,c){return s+Number(c.milhas||0);},0);
  var somaP=compras.reduce(function(s,c){return s+Number(c.milhas||0)*Number(c.cpm||0);},0);
  var cpmM=totM>0?somaP/totM:0;
  var usadas=DB.v.filter(function(v){return v.milContaId===m.id;}).reduce(function(s,v){return s+Number(v.milhas||0);},0);
  var saldo=Math.max(0,totM-usadas);
  return{totalComprado:totM,usadas:usadas,saldo:saldo,cpmMedio:cpmM,compras:compras};
}

function saveMil(id){
  var titular=gv('mil-titular');
  if(!titular){alert('Informe o titular da conta.');return;}
  // Read CPFs from dynamic rows
  var cpfs=milReadCpfRows();
  var senhaVal=document.getElementById('mil-senha')?document.getElementById('mil-senha').value:'';
  // Keep existing password if field empty
  var senhaFinal=senhaVal||(id?(DB.mil.find(function(x){return x.id===id})||{}).senha||'':'');
  var obj={
    id:id||uid(),
    titular:titular,
    programa:gv('mil-prog'),
    compras:milReadCompraRows(),
    saldo:(function(){var comp=milReadCompraRows();var tot=comp.reduce(function(s,c){return s+Number(c.milhas||0);},0);var used=id?DB.v.filter(function(v){return v.milContaId===id;}).reduce(function(s,v){return s+Number(v.milhas||0);},0):0;return Math.max(0,tot-used);}()),
    cpm:(function(){var comp=milReadCompraRows();var tot=comp.reduce(function(s,c){return s+Number(c.milhas||0);},0);var sp=comp.reduce(function(s,c){return s+Number(c.milhas||0)*Number(c.cpm||0);},0);return tot>0?sp/tot:0;}()),
    qtdCpf:cpfs.length,
    login:gv('mil-login'),
    senha:senhaFinal,
    vencimento:gv('mil-venc'),
    obs:gv('mil-obs'),
    cpfs:cpfs,
    criadoEm:id?(DB.mil.find(function(x){return x.id===id})||{}).criadoEm||new Date().toISOString():new Date().toISOString()
  };
  if(id){DB.mil=DB.mil.map(function(x){return x.id===id?obj:x});}
  else{DB.mil.unshift(obj);}
  saveDB();closeM();rMil();
}

function delMil(id){
  if(!confirm('Excluir esta conta de milhas?'))return;
  DB.mil=DB.mil.filter(function(x){return x.id!==id});
  saveDB();rMil();
}

function doCP(){
  var ca=document.getElementById("ca").value,cn=document.getElementById("cn").value,cc=document.getElementById("cc").value;
  var st=localStorage.getItem("mapp9_pw")||CFG.pw,cm=document.getElementById("cm");
  if(ca!==st){cm.style.color="var(--red)";cm.textContent="Senha atual incorreta.";return}
  if(!cn||cn.length<4){cm.style.color="var(--red)";cm.textContent="Nova senha deve ter ao menos 4 caracteres.";return}
  if(cn!==cc){cm.style.color="var(--red)";cm.textContent="As senhas não coincidem.";return}
  localStorage.setItem("mapp9_pw",cn);
  cm.style.color="var(--green)";cm.textContent="Senha alterada com sucesso!";
  // Sync new password to cloud immediately
  if(typeof jbSave==="function"&&JB.apiKey&&JB.binId)jbSave();
  document.getElementById("ca").value="";document.getElementById("cn").value="";document.getElementById("cc").value="";
}

function doRst(){
  if(!confirm("ATENÇÃO: Apagar TODOS os dados permanentemente?"))return;

  DB.pax=[];DB.v=[];DB.orc=[];DB.par=[];DB.mil=[];saveDB();alert("Dados apagados.");goTo("dash");
}

  DB.v.forEach(function(v){var c=calcV(v);var pl=v.paxList&&v.paxList.length?v.paxList:[{nome:v.paxNome,cpf:v.paxCPF}];

  var b=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download="milhasapp-relatorio-"+tod()+".csv";a.click();URL.revokeObjectURL(u);

function handleImp(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(!confirm("Importar dados? Os atuais serão SUBSTITUÍDOS."))return;
      DB.pax=d.pax||d.passageiros||[];
      DB.v=d.vendas||d.v||[];
      DB.orc=d.orcamentos||d.orc||[];
      DB.par=d.parcelas||d.par||[];
      DB.mil=d.mil||[];
      DB.v.forEach(function(v){if(!v.dataEmissao&&v.dataIda)v.dataEmissao=v.dataIda;if(!v.paxList||!v.paxList.length)v.paxList=[{nome:v.paxNome||"—",cpf:v.paxCPF||"",paxId:v.paxId||"",milhas:v.milhas||0,taxas:v.taxas||0}]});
      saveDB();alert("Importado!");goTo("dash");
    }catch(err){alert("Erro: "+err.message)}
  };r.readAsText(f);e.target.value="";
}

// Busca de aeroportos: por cidade, nome ou IATA
function searchAirports(q){
  if(!q||q.length<1)return[];
  var ql=q.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  var res=[];
  for(var i=0;i<AIRPORTS.length;i++){
    var a=AIRPORTS[i];
    var label=a[1].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    var iata=a[0].toLowerCase();
    // Prioridade 1: IATA começa com query
    if(iata.startsWith(ql)){res.unshift(a);continue}
    // Prioridade 2: cidade começa com query
    if(label.startsWith(ql)){res.push(a);continue}
    // Prioridade 3: qualquer palavra começa com query
    var words=label.split(/[\s\-,()]+/);
    for(var w=0;w<words.length;w++){
      if(words[w].startsWith(ql)){res.push(a);break}
    }
  }
  return res.slice(0,8);
}

// Monta dropdown de aeroporto
function buildAirportDropdown(inputId,dropId){
  var inp=document.getElementById(inputId);
  var drop=document.getElementById(dropId);
  if(!inp||!drop){console.warn("Airport dropdown: element not found",inputId,dropId);return;}
  inp.addEventListener("input",function(){
    var q=this.value.trim();
    if(!q||q.length<1){drop.style.display="none";return;}
    var results=searchAirports(q);
    if(!results.length){drop.style.display="none";return;}
    drop.innerHTML=results.map(function(a){
      return'<div class="po" onclick="selectAirport(\''+inputId+'\',\''+dropId+'\',\''+a[0]+'\',\''+a[1].replace(/'/g,"\\'")+'\')">'+
        '<div>'+
          '<div class="pon"><span style="font-family:monospace;font-size:13px;color:var(--accent);font-weight:800">'+a[0]+'</span> &nbsp;'+esc(a[1].replace(' ('+a[0]+')',''))+'</div>'+
          '<div class="poc">'+esc(a[2])+'</div>'+
        '</div>'+
        '<span style="font-size:10px;background:rgba(91,156,246,.15);color:var(--accent);padding:2px 7px;border-radius:12px;font-weight:700;font-family:monospace">'+a[0]+'</span>'+
      '</div>';
    }).join('');
    drop.style.display='block';
  });
  // Fechar ao clicar fora
  document.addEventListener('click',function handler(e){
    if(inp&&drop&&!inp.contains(e.target)&&!drop.contains(e.target))drop.style.display='none';
  });
}

function selectAirport(inputId,dropId,iata,label){
  var inp=document.getElementById(inputId);
  var drop=document.getElementById(dropId);
  if(inp){
    if(inputId==='vf-orig'||inputId==='vf-dest'){
      inp.value=iata.toUpperCase();
    } else {
      inp.value=label;
    }
  }
  if(drop)drop.style.display='none';
  // Trigger preview update for orçamento fields
  if(inputId==='o-dest'||inputId==='o-cids') updOrcPrev();
}

var GD={clientId:localStorage.getItem("mapp_gd_cid")||"",fileId:localStorage.getItem("mapp_gd_fid")||"",fileName:"milhasapp-data.json",scopes:"https://www.googleapis.com/auth/drive.file",ready:false,authed:false,syncing:false};

function gdSetStatus(state,txt){
  var dot=document.getElementById("drive-dot");
  var stxt=document.getElementById("drive-status-txt");
  var btn=document.getElementById("drive-btn");
  var btxt=document.getElementById("drive-btn-txt");
  if(dot)dot.className="drive-dot "+state;
  if(stxt){stxt.textContent=txt||"";stxt.style.display=txt?"inline":"none";}
  if(btn)btn.className="drive-btn"+(state==="ok"?" connected":state==="spin"?" syncing":"");
  if(btxt)btxt.textContent=state==="ok"?"Sincronizado":state==="spin"?"...":"Drive";
}

function gdInit(){
  if(!GD.clientId){gdSetStatus("off","");return;}
  if(typeof gapi==="undefined"){gdSetStatus("err","offline");return;}
  gapi.load("client:auth2",function(){
    gapi.client.init({clientId:GD.clientId,scope:GD.scopes,discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]})
    .then(function(){
      GD.ready=true;
      var ai=gapi.auth2.getAuthInstance();
      GD.authed=ai.isSignedIn.get();
      if(GD.authed){gdSetStatus("ok","");gdAutoSync();}
      else gdSetStatus("off","");
      ai.isSignedIn.listen(function(s){GD.authed=s;if(s){gdSetStatus("ok","");gdAutoSync();}else gdSetStatus("off","");});
    }).catch(function(e){gdSetStatus("err","Erro Client ID");console.error(e);});
  });
}

function driveAction(){
  if(!GD.clientId){alert("Configure o Google Client ID na aba Config.");goTo("cfg");return;}
  if(!GD.ready){gdInit();setTimeout(driveAction,2000);return;}
  if(!GD.authed){gapi.auth2.getAuthInstance().signIn().then(gdSync).catch(function(){gdSetStatus("err","Login cancelado");});return;}
  gdSync();
}

function gdSync(){
  if(GD.syncing)return;
  GD.syncing=true;gdSetStatus("spin","");
  gdFindFile().then(function(fid){
    if(fid){GD.fileId=fid;localStorage.setItem("mapp_gd_fid",fid);
      return gdDownload(fid).then(function(rem){gdMerge(rem);return gdUpload(fid);});
    }else return gdCreate();
  }).then(function(){
    GD.syncing=false;saveDB();
    gdSetStatus("ok",new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));
    document.getElementById("drive-status-txt").style.display="inline";
  }).catch(function(e){GD.syncing=false;gdSetStatus("err","Falha");console.error("Drive:",e);});
}

function gdAutoSync(){gdSync();setInterval(function(){if(GD.authed&&!GD.syncing)gdSync();},5*60*1000);}

function gdFindFile(){
  return gapi.client.drive.files.list({q:"name='"+GD.fileName+"' and trashed=false",fields:"files(id)",spaces:"drive"})
    .then(function(r){var f=r.result.files;return f&&f.length?f[0].id:null;});
}
function gdDownload(fid){
  return gapi.client.drive.files.get({fileId:fid,alt:"media"})
    .then(function(r){try{return JSON.parse(r.body);}catch(e){return null;}});
}
function gdMerge(rem){
  if(!rem)return;
  function mrg(loc,r){if(!r||!r.length)return loc;var m={};loc.forEach(function(x){if(x.id)m[x.id]=x;});r.forEach(function(x){if(x.id)m[x.id]=x;});return Object.values(m);}
  if(rem.pax)DB.pax=mrg(DB.pax,rem.pax);
  if(rem.vendas)DB.v=mrg(DB.v,rem.vendas);
  if(rem.orc)DB.orc=mrg(DB.orc,rem.orc);
  if(rem.par)DB.par=mrg(DB.par,rem.par);
}
function gdUpload(fid){
  var b=JSON.stringify({version:11,savedAt:new Date().toISOString(),pw:localStorage.getItem("mapp9_pw")||"",pax:DB.pax,vendas:DB.v,orc:DB.orc,par:DB.par,mil:DB.mil});
  return gapi.client.request({path:"/upload/drive/v3/files/"+fid,method:"PATCH",params:{uploadType:"media"},headers:{"Content-Type":"application/json"},body:b});
}
function gdCreate(){
  return gapi.client.drive.files.create({resource:{name:GD.fileName,mimeType:"application/json"},fields:"id"})
    .then(function(r){GD.fileId=r.result.id;localStorage.setItem("mapp_gd_fid",GD.fileId);return gdUpload(GD.fileId);});
}
function gdDisconnect(){
  if(!GD.authed)return;
  gapi.auth2.getAuthInstance().signOut().then(function(){gdSetStatus("off","");});
}
function gdSaveCid(){
  var cid=gv("gd-cid").trim();
  if(!cid){alert("Cole o Client ID.");return;}
  GD.clientId=cid;localStorage.setItem("mapp_gd_cid",cid);
  gdInit();setTimeout(function(){if(GD.ready)driveAction();},2000);
  alert("Client ID salvo! Aguardando conexão...");
}

function jbSetStatus(state, txt){
  JB.status=state;
  var btn=document.getElementById("jb-btn");
  var dot=document.getElementById("jb-dot");
  var stxt=document.getElementById("jb-txt");
  if(!btn)return;
  btn.style.display="flex";
  btn.className="jb-btn "+(state==="ok"?"ok":state==="syncing"?"syncing":state==="err"?"err":"");
  if(dot)dot.className="jb-dot "+state;
  if(stxt)stxt.textContent=state==="ok"?"Nuvem ✓":state==="syncing"?"Salvando...":state==="err"?"Erro Nuvem":"Nuvem";
}

function jbGetHeaders(){
  return{
    "Content-Type":"application/json",
    "X-Master-Key": JB.apiKey,
    "X-Bin-Versioning":"false"
  };
}

function jbPayload(){
  return JSON.stringify({
    version:11,
    savedAt: new Date().toISOString(),
    pw:localStorage.getItem("mapp9_pw")||"",
    pax:DB.pax, vendas:DB.v, orc:DB.orc, par:DB.par, mil:DB.mil
  });
}

// Cria um novo bin e salva os dados
function jbCreateBin(){
  jbSetStatus("syncing","");
  return fetch("https://api.jsonbin.io/v3/b",{
    method:"POST",
    headers:Object.assign({},jbGetHeaders(),{"X-Bin-Name":"MilhasApp","X-Bin-Private":"true"}),
    body: jbPayload()
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.metadata&&d.metadata.id){
      JB.binId=d.metadata.id;
      localStorage.setItem("mapp_jb_bid",JB.binId);
      jbSetStatus("ok","");
      return d.metadata.id;
    } else {
      throw new Error(d.message||"Erro ao criar bin");
    }
  });
}

// Salva (PUT) os dados no bin existente
function jbSave(){
  if(!JB.apiKey||!JB.binId)return Promise.resolve();
  jbSetStatus("syncing","");
  return fetch("https://api.jsonbin.io/v3/b/"+JB.binId,{
    method:"PUT",
    headers: jbGetHeaders(),
    body: jbPayload()
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.metadata){
      jbSetStatus("ok","");
    } else {
      throw new Error(d.message||"Erro ao salvar");
    }
  })
  .catch(function(e){
    jbSetStatus("err","");
    console.error("JSONBin save error:",e);
  });
}

// Carrega (GET) os dados do bin
function jbLoad(){
  if(!JB.apiKey||!JB.binId)return Promise.resolve(null);
  jbSetStatus("syncing","");
  return fetch("https://api.jsonbin.io/v3/b/"+JB.binId+"/latest",{
    method:"GET",
    headers: jbGetHeaders()
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.record){
      jbSetStatus("ok","");
      return d.record;
    } else {
      throw new Error(d.message||"Erro ao carregar");
    }
  })
  .catch(function(e){
    jbSetStatus("err","");
    console.error("JSONBin load error:",e);
    return null;
  });
}

// Aplica dados remotos ao DB local (merge por ID)
function jbApplyRemote(remote){
  if(!remote)return;
  function merge(local,rem){
    if(!rem||!rem.length)return local;
    var m={};
    local.forEach(function(x){if(x.id)m[x.id]=x;});
    rem.forEach(function(x){if(x.id)m[x.id]=x;});
    return Object.values(m);
  }
  if(remote.pax)   DB.pax=merge(DB.pax,remote.pax);
  if(remote.vendas)DB.v  =merge(DB.v,  remote.vendas);
  if(remote.orc)   DB.orc=merge(DB.orc,remote.orc);
  if(remote.par)   DB.par=merge(DB.par,remote.par);
  if(remote.mil)   DB.mil=merge(DB.mil,remote.mil);
  // Restore password if remote has one
  if(remote.pw)    localStorage.setItem("mapp9_pw",remote.pw);
  saveDB();
}

// Sincroniza: carrega remoto, faz merge, salva
function jbSync(){
  if(!JB.apiKey||!JB.binId)return;
  jbLoad().then(function(remote){
    jbApplyRemote(remote);
    return jbSave();
  }).then(function(){
    // Atualiza a página atual se necessário
    if(pg==="dash")rDash();
    else if(pg==="hist")rHist();
    else if(pg==="pax")rPax();
    else if(pg==="par")rPar();
  });
}

// Salva silenciosamente após cada alteração
function jbAutoSave(){
  if(!JB.apiKey||!JB.binId)return;
  if(JB.timer)clearTimeout(JB.timer);
  JB.timer=setTimeout(function(){jbSave();},1500); // debounce 1.5s
}

// Botão nuvem na topbar
function jbAction(){
  if(!JB.apiKey){goTo("cfg");return;}
  jbSync();
}

// Salvar configuração na aba Config
function jbSaveConfig(){
  var key=document.getElementById("jb-key") ? document.getElementById("jb-key").value.trim() : "";
  var bid=document.getElementById("jb-bid") ? document.getElementById("jb-bid").value.trim() : "";
  var msg=document.getElementById("jb-cfg-msg");

  if(!key){
    if(msg){msg.style.color="var(--red)";msg.textContent="Cole sua API Key primeiro.";}
    return;
  }

  JB.apiKey=key;
  localStorage.setItem("mapp_jb_key",key);

  if(msg){msg.style.color="var(--amber)";msg.textContent="Conectando...";}

  if(bid){
    // Bin ID já existe — apenas reconectar
    JB.binId=bid;
    localStorage.setItem("mapp_jb_bid",bid);
    jbSetStatus("ok","");
    if(msg){msg.style.color="var(--green)";msg.textContent="✓ Reconectado! Sincronizando dados...";}
    jbSync();
    setTimeout(function(){rCfg();},1800);
  } else {
    // Criar novo bin
    jbCreateBin()
    .then(function(){
      if(msg){msg.style.color="var(--green)";msg.textContent="✓ Bin criado e dados salvos! Tudo sincronizado.";}
      // Inicia auto-save
      jbSetStatus("ok","");
      setTimeout(function(){rCfg();},1800);
    })
    .catch(function(e){
      if(msg){msg.style.color="var(--red)";msg.textContent="Erro: "+(e.message||"Verifique sua API Key.");}
      jbSetStatus("err","");
    });
  }
}

function jbDisconnect(){
  if(!confirm("Desconectar JSONBin? Os dados continuam salvos localmente."))return;
  JB.apiKey="";JB.binId="";
  localStorage.removeItem("mapp_jb_key");
  localStorage.removeItem("mapp_jb_bid");
  var btn=document.getElementById("jb-btn");
  if(btn)btn.style.display="none";
  rCfg();
}


// ═══════════════════════════════════════════════════
//  MÁSCARAS NUMÉRICAS
// ═══════════════════════════════════════════════════
function maskMilhas(el){
  var raw=(el.value||"").replace(/\D/g,"");
  if(!raw){el.dataset.raw="0";return;}
  el.dataset.raw=raw;
  el.value=Number(raw).toLocaleString("pt-BR");
}
function maskMoeda(el){
  var raw=(el.value||"").replace(/[^\d]/g,"");
  if(!raw){el.dataset.raw="0";return;}
  var num=parseInt(raw,10)/100;
  el.dataset.raw=num.toFixed(2);
  el.value=num.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function maskCPM(el){
  // Shift-left decimal mask: digits shift left filling 4 decimal places
  // "1" → 0,0001 | "165" → 0,0165 | "1650" → 0,1650 | "16500" → 1,6500
  var raw=(el.value||"").replace(/\D/g,"");
  if(!raw){el.dataset.raw="0";el.value="0,0000";return;}
  // Remove leading zeros
  raw=raw.replace(/^0+/,"");
  if(!raw)raw="0";
  // Pad to at least 5 digits
  while(raw.length<5)raw="0"+raw;
  // Insert decimal point 4 places from right
  var intPart=raw.slice(0,-4).replace(/^0+/,"")||"0";
  var decPart=raw.slice(-4);
  // Format integer part with thousand separators
  intPart=Number(intPart).toLocaleString("pt-BR");
  var num=parseFloat(intPart.replace(/\./g,"")+"."+decPart);
  el.dataset.raw=num.toFixed(4);
  el.value=intPart+","+decPart;
}
function applyFieldMask(id,tipo){
  var el=document.getElementById(id);
  if(!el||el.dataset.masked)return;
  el.dataset.masked="1";
  el.type="text";
  el.inputMode="numeric";
  // Format existing value
  if(el.value&&!isNaN(parseFloat(el.value.replace(",",".")))){
    var n=parseFloat(el.value.replace(",","."));
    if(tipo==="milhas")el.value=n?n.toLocaleString("pt-BR"):"";
    else if(tipo==="moeda")el.value=n?n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}):"";
    else if(tipo==="cpm")el.value=n?n.toLocaleString("pt-BR",{minimumFractionDigits:4,maximumFractionDigits:4}):"";
    el.dataset.raw=String(n);
  }
  el.addEventListener("input",function(){
    if(tipo==="milhas")maskMilhas(this);
    else if(tipo==="moeda")maskMoeda(this);
    else if(tipo==="cpm")maskCPM(this);
    if(typeof calcPv==="function")calcPv();
    if(typeof autoFillParc==="function"&&id==="par-total")autoFillParc();
    if(typeof updOrcPrev==="function"&&id==="o-valor")updOrcPrev();
  });
  el.addEventListener("blur",function(){
    if(tipo==="milhas")maskMilhas(this);
    else if(tipo==="moeda")maskMoeda(this);
    else if(tipo==="cpm")maskCPM(this);
  });
}
function applyNumMasks(){
  applyFieldMask("vf-venda","moeda");
  applyFieldMask("vf-cpm","cpm");
  applyFieldMask("o-valor","moeda");
  applyFieldMask("mil-saldo","milhas");
  applyFieldMask("mil-cpm","cpm");
  applyFieldMask("par-total","moeda");
  for(var i=0;i<30;i++){
    if(!document.getElementById("pm-"+i)&&!document.getElementById("pt-"+i))break;
    applyFieldMask("pm-"+i,"milhas");
    applyFieldMask("pt-"+i,"moeda");
  }
  for(var j=0;j<60;j++){
    if(!document.getElementById("pv-"+j))break;
    applyFieldMask("pv-"+j,"moeda");
  }
}

//  INIT
// ─────────────────────────────────────────────
function initApp(){
  loadDB();
  DB.v.forEach(function(v){if(!v.dataEmissao&&v.dataIda)v.dataEmissao=v.dataIda;if(!v.paxList||!v.paxList.length)v.paxList=[{nome:v.paxNome||"",cpf:v.paxCPF||"",paxId:v.paxId||"",milhas:v.milhas||0,taxas:v.taxas||0}]});
  if(!DB.pax.length&&DB.passageiros)DB.pax=DB.passageiros;
  buildNav();goTo("dash");
  window.onresize=function(){if(pg==="dash")rDash()};
  // Se JSONBin configurado: mostrar botão e carregar da nuvem
  if(JB.apiKey&&JB.binId&&typeof jbLoad==="function"){
    jbSetStatus("syncing","");
    jbLoad().then(function(remote){
      if(remote){jbApplyRemote(remote);if(pg==="dash")rDash();}
      jbSetStatus("ok","");
    });
  }
  setTimeout(gdInit,2000);
}
window.onload=function(){
  if(localStorage.getItem(CFG.sk)==="1"){document.getElementById("login-screen").style.display="none";document.getElementById("app").classList.add("on");initApp()}
  else document.getElementById("pw").focus();
};
